databases:
  - name: linksheet-db
    databaseName: linksheet
    user: linksheet_user
    plan: free

services:
  # The Redis broker for Celery
  - type: redis
    name: linksheet-redis
    plan: free
    ipAllowList: []

  # The main Django Web App
  - type: web
    name: linksheet-web
    env: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: linksheet-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: linksheet-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        value: django-db
      # You will populate these values manually in the Render dashboard
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: FIELD_ENCRYPTION_KEY
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: DJANGO_DEBUG
        value: "False"

  # The Celery Background Worker
  - type: worker
    name: linksheet-celery
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "celery -A config worker -l info"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: linksheet-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: linksheet-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        value: django-db
      # Same secrets as the web app
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: FIELD_ENCRYPTION_KEY
        sync: false
      - key: DJANGO_DEBUG
        value: "False"

databases:
  - name: linksheet-db
    databaseName: linksheet
    user: linksheet_user
    plan: free

services:
  # The Redis broker for Celery
  - type: redis
    name: linksheet-redis
    plan: free
    ipAllowList: []

  # The main Django Web App + Celery Worker
  - type: web
    name: linksheet-web
    env: python
    plan: free
    buildCommand: "./build.sh"
    # Runs Celery solo (no child processes), and limits Gunicorn to 1 worker to stay under 512MB RAM
    startCommand: "celery -A config worker -l info --pool=solo & gunicorn config.wsgi:application --workers 1 --bind 0.0.0.0:10000"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: linksheet-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: linksheet-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        value: django-db
      # Same secrets as the web app
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: FIELD_ENCRYPTION_KEY
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: "linksheet-web.onrender.com"
      - key: PORT
        value: "10000"
      # These replace the need for the linksheet.json file
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false


